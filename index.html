<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Hub</title>
    <meta name="description" content="Personal dashboard for OpenClaw" />
    <!-- No external requests. All assets bundled locally. -->
  </head>
  <body>
    <div id="root">
      <!-- App shell loader — visible until React hydrates -->
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0f;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;margin:0 auto 12px;border:3px solid rgba(255,255,255,0.1);border-top-color:#6366f1;border-radius:50%;animation:app-spin 0.8s linear infinite;"></div>
          <div style="color:rgba(255,255,255,0.4);font-family:system-ui;font-size:13px;">Loading</div>
        </div>
      </div>
      <style>@keyframes app-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
